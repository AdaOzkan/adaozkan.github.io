<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Feedback | Ada Özkan</title>
    <link rel="icon" type="image/x-icon" href="adalogo.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @font-face { font-family: 'F1Black'; src: url('Formula1-Black.ttf') format('truetype'); }
        @font-face { font-family: 'F1Regular'; src: url('Formula1-Regular-1.ttf') format('truetype'); }

        body {
            margin: 0; font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; color: white; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('image_cc4e40.png'); background-repeat: no-repeat;
            background-position: center; background-size: cover; opacity: 0.15; z-index: -2;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        header {
            background: rgba(20, 41, 72, 0.85); backdrop-filter: blur(10px);
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 3px solid #3671c6;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }

        nav { display: flex; align-items: center; }
        nav a { 
            color: white; margin-left: 25px; text-decoration: none; 
            display: inline-flex; align-items: center; gap: 8px; font-size: 14px; transition: 0.3s;
        }
        nav a:hover { color: #27f4d2; }

        .section {
            max-width: 850px; margin: 80px auto; padding: 50px 40px;
            background: rgba(15, 15, 15, 0.9); border-radius: 20px; border: 1px solid #222;
        }

        h2 { font-family: 'F1Black', sans-serif; border-left: 5px solid #e8002d; padding-left: 15px; margin-bottom: 30px; font-size: 24px; }

        .feedback-form { display: flex; flex-direction: column; gap: 15px; }
        .feedback-form input, .feedback-form textarea {
            background: #111; border: 1px solid #333; color: white;
            padding: 15px; border-radius: 10px; font-family: inherit;
        }

        .feedback-btn {
            background: #27f4d2; color: #0a0a0a; border: none; padding: 18px;
            border-radius: 10px; font-family: 'F1Black', sans-serif;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .feedback-btn:hover { background: white; transform: scale(1.02); }

        footer { text-align: center; padding: 60px; font-family: 'F1Black', sans-serif; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="projeler.html"><i class="fa-solid fa-layer-group"></i> Projects</a>
        <a href="feedback.html" style="color: #27f4d2;"><i class="fa-solid fa-comment-dots"></i> Feedback</a>
    </nav>
</header>

<section class="section">
    <h2>Feedback</h2>
    <form action="https://formspree.io/f/xgolbzyv" method="POST" class="feedback-form">
        <input type="email" name="email" placeholder="E-posta Adresiniz" required>
        <textarea name="message" rows="8" placeholder="Mesajınız..." required></textarea>
        <button type="submit" class="feedback-btn">GÖNDER</button>
    </form>
</section>

<footer>© 2026 ADA OZKAN • DESIGNED FOR PERFORMANCE</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 150, "density": { "enable": true, "value_area": 1000 } },
            "color": { "value": "#27f4d2" },
            "opacity": { "value": 0.6 },
            "size": { "value": 4 },
            "line_linked": {
                "enable": true, "distance": 130, "color": "#ff8000", "opacity": 0.5, "width": 1.5
            },
            "move": { "speed": 1.5 }
        },
        "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
    });
</script>
</body>
</html>
