<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ada Özkan</title>
    
    <link rel="icon" type="image/x-icon" href="adalogo.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* FONT TANIMLARI */
        @font-face { font-family: 'Northwell'; src: url('Northwell.otf') format('opentype'); font-display: swap; }
        @font-face { font-family: 'F1Black'; src: url('Formula1-Black.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'F1Regular'; src: url('Formula1-Regular-1.ttf') format('truetype'); font-display: swap; }

        body { margin: 0; font-family: 'F1Regular', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; position: relative; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('image_cc4e40.png'); background-repeat: no-repeat; background-position: center; background-size: cover; opacity: 0.15; z-index: -2; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        /* HEADER */
        header { background: rgba(20, 41, 72, 0.85); backdrop-filter: blur(10px); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3671c6; position: sticky; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        nav a:hover { color: #27f4d2; }

        /* HERO */
        .hero { padding: 150px 20px; text-align: center; }
        .hero .name-ada { font-family: 'Northwell', cursive; font-size: clamp(90px, 14vw, 150px); color: #27f4d2; line-height: 0.2; }
        .hero .name-ozkan { font-family: 'F1Black', sans-serif; font-size: clamp(40px, 8vw, 80px); letter-spacing: 12px; color: #ffffff; text-transform: uppercase; margin-top: -20px; display: block; }
        .hero p { letter-spacing: 5px; color: #27f4d2; margin-top: 50px; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* SECTIONS */
        .section { max-width: 850px; margin: 0 auto 40px auto; padding: 50px 40px; background: rgba(15, 15, 15, 0.9); border-radius: 20px; border: 1px solid #222; }
        h2 { font-family: 'F1Black', sans-serif; border-left: 5px solid #e8002d; padding-left: 15px; margin-bottom: 30px; font-size: 24px; }

        /* F1 COUNTDOWN STYLE (Visual Ref: image_e34c09.png) */
        .f1-container { padding: 20px 0; }
        .f1-status-label { font-family: 'F1Black', sans-serif; font-size: 14px; color: #aaa; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        
        .race-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .circle-flag { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .location-name { font-family: 'F1Regular', sans-serif; font-size: clamp(28px, 5vw, 42px); color: white; }
        .f1-arrow { font-size: 28px; color: #fff; margin-left: 5px; opacity: 0.8; }

        .countdown-row { display: flex; align-items: center; gap: 20px; }
        .race-label { font-family: 'F1Black', sans-serif; font-size: clamp(30px, 6vw, 55px); color: white; }
        .vertical-divider { width: 2px; height: 60px; background: #444; }
        
        .timer-display { display: flex; align-items: baseline; font-family: 'F1Black', sans-serif; gap: 5px; }
        .t-num { font-size: clamp(30px, 6vw, 55px); color: #fff; }
        .t-unit { font-family: 'F1Regular', sans-serif; font-size: clamp(16px, 3vw, 28px); color: #888; margin-right: 10px; }

        /* NEXT RACE PREVIEW */
        .next-race-preview { margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; }
        .next-race-label { font-family: 'F1Black', sans-serif; font-size: 12px; color: #e8002d; margin-bottom: 10px; }
        .next-race-info { font-family: 'F1Regular', sans-serif; font-size: 18px; color: #fff; display: flex; align-items: center; gap: 10px; opacity: 0.7; }

        footer { text-align: center; padding: 60px; font-family: 'F1Black', sans-serif; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" height="35">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#about"><i class="fa-solid fa-user"></i> About</a>
        <a href="#contact"><i class="fa-solid fa-envelope"></i> Contact</a>
    </nav>
</header>

<section class="hero">
    <span class="name-ada">Ada</span>
    <span class="name-ozkan">OZKAN</span>
    <p>ELECTRONICS • SPACE • ENGINEERING</p>
</section>

<section class="section">
    <div style="margin-bottom: 30px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" alt="F1" width="70" style="filter: drop-shadow(0 0 5px #e8002d);">
    </div>

    <div class="f1-container">
        <div class="f1-status-label">Current Race</div>
        
        <div class="race-header">
            <img id="curr-flag" src="" class="circle-flag">
            <span id="curr-location" class="location-name">LOADING...</span>
            <span class="f1-arrow">></span>
        </div>

        <div class="countdown-row">
            <div class="race-label">Race</div>
            <div class="vertical-divider"></div>
            <div class="timer-display">
                <span id="h-val" class="t-num">00</span><span class="t-unit">H</span>
                <span id="m-val" class="t-num">00</span><span class="t-unit">M</span>
                <span id="s-val" class="t-num">00</span><span class="t-unit">S</span>
            </div>
        </div>
    </div>

    <div class="next-race-preview">
        <div class="next-race-label">UPCOMING NEXT</div>
        <div id="next-race-details" class="next-race-info">
            ---
        </div>
    </div>
</section>

<footer>© 2026 ADA OZKAN • DESIGNED FOR PERFORMANCE</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 100 },
            "color": { "value": "#27f4d2" },
            "line_linked": { "enable": true, "color": "#ff8000", "opacity": 0.4 },
            "move": { "speed": 1 }
        }
    });

    const schedule = [
        { name: "Australia", date: "2026-03-08T07:00:00", country: "au" },
        { name: "Japan", date: "2026-03-29T08:00:00", country: "jp" },
        { name: "Bahrain", date: "2026-04-12T18:00:00", country: "bh" },
        { name: "Saudi Arabia", date: "2026-04-19T20:00:00", country: "sa" },
        { name: "Monaco", date: "2026-06-07T16:00:00", country: "mc" },
        { name: "Barcelona-Catalunya", date: "2026-06-14T16:00:00", country: "es" },
        { name: "Austria", date: "2026-06-28T16:00:00", country: "at" },
        { name: "Belgium", date: "2026-07-19T16:00:00", country: "be" },
        { name: "Hungary", date: "2026-07-26T16:00:00", country: "hu" },
        { name: "Italy", date: "2026-09-06T16:00:00", country: "it" },
        { name: "Spain (Madrid)", date: "2026-09-13T16:00:00", country: "es" },
        { name: "Azerbaijan", date: "2026-09-26T14:00:00", country: "az" },
        { name: "United States", date: "2026-10-25T22:00:00", country: "us" },
        { name: "Mexico", date: "2026-11-01T23:00:00", country: "mx" },
        { name: "Brazil", date: "2026-11-08T20:00:00", country: "br" },
        { name: "Las Vegas", date: "2026-11-21T09:00:00", country: "us" },
        { name: "Qatar", date: "2026-11-29T20:00:00", country: "qa" },
        { name: "Abu Dhabi", date: "2026-12-06T16:00:00", country: "ae" }
    ];

    function updateLogic() {
        const now = new Date().getTime();
        let currentIdx = schedule.findIndex(r => new Date(r.date).getTime() > now);
        
        if (currentIdx === -1) {
            document.getElementById('curr-location').innerText = "Season Ended";
            return;
        }

        const current = schedule[currentIdx];
        const next = schedule[currentIdx + 1];

        // Update Current Race UI
        document.getElementById('curr-location').innerText = current.name;
        document.getElementById('curr-flag').src = `https://flagcdn.com/w80/${current.country}.png`;

        const diff = new Date(current.date).getTime() - now;
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('h-val').innerText = h.toString().padStart(2, '0');
        document.getElementById('m-val').innerText = m.toString().padStart(2, '0');
        document.getElementById('s-val').innerText = s.toString().padStart(2, '0');

        // Update Next Race Preview
        if (next) {
            const nextDateStr = new Date(next.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
            document.getElementById('next-race-details').innerHTML = 
                `<i class="fa-solid fa-calendar-days"></i> ${next.name} — ${nextDateStr}`;
        } else {
            document.getElementById('next-race-details').innerText = "Last race of the season";
        }
    }

    setInterval(updateLogic, 1000);
    updateLogic();
</script>

</body>
</html>
