<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ada Özkan</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'Northwell';
            src: url('Northwell.otf') format('opentype');
            font-display: swap;
        }

        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
            font-display: swap;
        }

        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
            font-display: swap;
        }

        /* GENEL AYARLAR */
        body {
            margin: 0;
            /* Black ve Northwell dışındaki tüm yazılar F1Regular olacak */
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* ARKA PLAN DESENİ (YÜKLEDİĞİN GÖRSEL) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image_cc4e40.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            opacity: 0.15; /* Görselin okunabilirliği bozmaması için şeffaflık */
            z-index: -2;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        /* HEADER */
        header {
            background: rgba(20, 41, 72, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'F1Black', sans-serif;
            color: #27f4d2;
            font-size: 20px;
            letter-spacing: 2px;
        }

        nav a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover { color: #27f4d2; }

        /* HERO SECTION */
        .hero {
            padding: 150px 20px;
            text-align: center;
        }
        
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ADA YAZISI (ÜSTTE) */
        .hero .name-ada {
            font-family: 'Northwell', cursive;
            font-size: clamp(90px, 14vw, 150px);
            color: #27f4d2;
            line-height: 0.2; /* Mesafeyi daraltan satır */
            display: block;
            position: relative;
            z-index: 2; /* Özkan'ın üstünde durmasını sağlar */
        }

        /* ÖZKAN YAZISI (ALTTA) */
        .hero .name-ozkan {
            font-family: 'F1Black', sans-serif;
            font-size: clamp(40px, 8vw, 80px);
            letter-spacing: 12px;
            display: block;
            margin-top: -20px; /* Ada'ya yaklaştıran satır */
            color: #ffffff;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .hero p {
            letter-spacing: 5px;
            color: #27f4d2;
            margin-top: 50px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* BÖLÜMLER */
        .section {
            max-width: 850px;
            margin: 0 auto 40px auto;
            padding: 50px 40px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 20px;
            border: 1px solid #222;
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* İLETİŞİM VE LİNKLER */
        .contactBox {
            border-left: 5px solid #ff8000;
            padding: 20px;
            background: rgba(30, 30, 30, 0.5);
            margin-bottom: 30px;
            border-radius: 0 10px 10px 0;
        }

        .contact-link {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .contact-link i { margin-right: 15px; color: #ff8000; width: 20px; text-align: center; }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .links a {
            background: #1a1a1a;
            color: #27f4d2;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            border: 1px solid #333;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .links a:hover {
            border-color: #27f4d2;
            transform: translateY(-5px);
            background: #27f4d2;
            color: #000;
        }

        /* FORM */
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feedback-form input, .feedback-form textarea {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-family: inherit;
        }

        .feedback-btn {
            background: #27f4d2;
            color: #0a0a0a;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-family: 'F1Black', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* SPOTIFY */
        .spotify-container {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            padding: 60px;
            font-family: 'F1Black', sans-serif;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        /* MOBİL AYARLAR */
        @media (max-width: 600px) {
            .section { padding: 30px 20px; width: 90%; }
            .hero .name-ada { font-size: 80px; line-height: 0.1; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <div class="logo">ADA OZKAN</div>
    <nav>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="title-container">
        <span class="name-ada">Ada</span>
        <span class="name-ozkan">OZKAN</span>
    </div>
    <p>ELECTRONICS • SPACE • ENGINEERING</p>
</section>

<section class="section" id="about">
    <h2>About</h2>
    <p>I am Ada Özkan.</p>
</section>

<section class="section" id="contact">
    <h2>Contact & Links</h2>
    
    <div class="contactBox">
        <a href="mailto:adaozkan7106@gmail.com" class="contact-link">
            <i class="fas fa-envelope"></i> adaozkan7106@gmail.com
        </a>
        <a href="tel:+905070107106" class="contact-link">
            <i class="fas fa-phone"></i> +90 507 010 7106
        </a>
    </div>

    <div class="links">
        <a href="https://github.com/adaOzkan" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://linkedin.com/in/ada-özkan-a7b984287/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
        <a href="https://leetcode.com/u/adaozkan_7106/" target="_blank"><i class="fas fa-code"></i> LeetCode</a>
        <a href="https://replit.com/@AdaOzkan1" target="_blank"><i class="fas fa-terminal"></i> Replit</a>
        <a href="https://open.spotify.com/user/bfdgv11xqokua4z13cd1sbxt0" target="_blank"><i class="fab fa-spotify"></i> Spotify</a>
    </div>

    <h2 style="margin-top:40px;">Spotify</h2>
    <div class="spotify-container">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/2aIK2KcCpCOOFqJrjcLxkc?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/4uqlFpMPTKO6uAsX6qvK0l?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
</section>

<section class="section">
    <h2>Feedback</h2>
    <form action="https://formspree.io/f/xgolbzyv" method="POST" class="feedback-form">
        <input type="email" name="email" placeholder="E-posta Adresiniz" required>
        <textarea name="message" rows="5" placeholder="Mesajınız..." required></textarea>
        <button type="submit" class="feedback-btn">GÖNDER</button>
    </form>
</section>

<footer>© 2026 ADA OZKAN • DESIGNED FOR PERFORMANCE</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 150, "density": { "enable": true, "value_area": 1000 } },
            "color": { "value": "#27f4d2" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.6 },
            "size": { "value": 4 },
            "line_linked": {
                "enable": true,
                "distance": 130,
                "color": "#ff8000",
                "opacity": 0.5,
                "width": 1.5
            },
            "move": { "speed": 1.5 }
        },
        "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
    });
</script>

</body>
</html>
