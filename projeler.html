<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            min-height: 100vh;
            position: relative;
        }

        /* ARKA PLAN PARÇACIKLARI */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        /* HEADER */
        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        
        nav a { 
            color: white; 
            margin-left: 25px; 
            text-decoration: none; 
            font-size: 14px; 
            transition: 0.3s; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        nav a i { font-size: 16px; }
        nav a:hover { color: #27f4d2; }

        /* ANA KONTEYNER */
        .main-container {
            margin: 30px auto;
            max-width: 1200px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px;
            border: 1px solid #222;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffffff;
        }

        /* HARİTA ALANI */
        #map { 
            width: 100%; 
            height: 500px;
            border-radius: 15px;
            z-index: 1; 
        }

        /* ANALİZ PANELİ */
        .panel {
            position: absolute;
            top: 100px;
            left: 45px;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px;
            z-index: 1000;
            border-radius: 12px;
            border: 1px solid #3671c6;
        }

        button {
            margin: 3px;
            padding: 8px 10px;
            border: 1px solid #27f4d2;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        button:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        /* REACTION TIMER STİLLERİ */
        .rt-section { margin-top: 40px; padding-top: 30px; border-top: 1px solid #333; }
        .timing-board { background: #0d0d0d; border: 1px solid #333; max-width: 550px; margin: 20px auto; border-radius: 10px; overflow: hidden; }
        .timing-header { background: #15151e; padding: 12px 15px; display: flex; align-items: center; border-bottom: 2px solid #333; }
        .team-indicator { width: 4px; height: 18px; background: #e8002d; margin-right: 10px; }
        .driver-name { font-family: 'F1Black', sans-serif; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
        
        .timing-content { padding: 25px; display: flex; justify-content: space-between; align-items: baseline; }
        .current-time { font-family: 'F1Black', sans-serif; font-size: 48px; position: relative; }
        .delta { font-family: 'F1Regular', sans-serif; font-size: 16px; margin-left: 10px; vertical-align: middle; }
        
        .best-lap-container { text-align: right; }
        .best-time { font-family: 'F1Regular', sans-serif; font-size: 22px; display: block; }
        .best-driver { font-family: 'F1Black', sans-serif; font-size: 12px; color: #888; text-transform: uppercase; }

        .status-bar { height: 6px; width: 100%; background: #222; display: flex; }
        .sector { flex: 1; border-right: 1px solid #000; transition: 0.3s; }

        #start-zone { 
            width: 100%; height: 120px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; margin-top: 15px; font-family: 'F1Black', sans-serif; border: 2px dashed #444; transition: 0.2s;
            text-align: center;
        }
        .ready { background: #e8002d !important; color: white; border-style: solid !important; }
        .go { background: #00ff00 !important; color: black !important; border-style: solid !important; }

        /* Durum Renkleri */
        .purple { color: #b15efb !important; } .bg-purple { background: #b15efb !important; }
        .green { color: #00ff00 !important; }  .bg-green { background: #00ff00 !important; }
        .yellow { color: #fff000 !important; } .bg-yellow { background: #fff000 !important; }

        /* CURRENCY BÖLÜMÜ */
        .currency-section { margin-top: 30px; padding-top: 30px; border-top: 1px solid #333; }
        .converter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end; }
        label { font-family: 'F1Black', sans-serif; font-size: 11px; color: #27f4d2; margin-bottom: 8px; display: block; }
        input, select {
            width: 100%; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-family: 'F1Regular', sans-serif;
        }
        .calc-btn {
            background: #27f4d2; color: #000; font-family: 'F1Black', sans-serif;
            border: none; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .calc-btn:hover { background: #fff; }
        .result-display {
            margin-top: 20px; padding: 20px; background: rgba(39, 244, 210, 0.05);
            border-radius: 12px; text-align: center; font-family: 'F1Black', sans-serif;
            font-size: 22px; color: #27f4d2; border: 1px dashed #27f4d2;
        }

        footer { text-align: center; padding: 40px; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="projeler.html" style="color: #27f4d2;"><i class="fa-solid fa-layer-group"></i> Projects</a>
    </nav>
</header>

<div class="main-container">
    <h2>Mahalle Veri Analizi</h2>
    
    <div class="panel">
        <button onclick="gosterNufus()">Nüfus</button>
        <button onclick="gosterYas()">Yaş</button>
        <button onclick="gosterMedeni()">Medeni</button>
        <button onclick="gosterEgitim()">Eğitim</button>
        <button onclick="resetMap()" class="reset-btn">Temizle</button>
    </div>

    <div id="map"></div>

    <div class="currency-section">
        <h2>Global Currency Converter</h2>
        <div class="converter-grid">
            <div>
                <label>MİKTAR</label>
                <input type="number" id="amount" value="1">
            </div>
            <div>
                <label>KAYNAK</label>
                <select id="fromCurrency"></select>
            </div>
            <div>
                <label>HEDEF</label>
                <select id="toCurrency"></select>
            </div>
            <button class="calc-btn" onclick="convertCurrency()">HESAPLA</button>
        </div>
        <div class="result-display" id="result">HESAPLAMAK İÇİN TIKLAYIN</div>
    </div>

    <div class="rt-section">
        <h2>Reaction Telemetry</h2>
        
        <div id="setup-panel" style="text-align:center; padding: 20px;">
            <label style="text-align:center;">PİLOT İSMİ GİRİNİZ</label>
            <input type="text" id="p-name" placeholder="ÖRN: ÖZKAN" style="text-align:center; width: 250px; margin: 0 auto 15px auto;">
            <br>
            <button class="calc-btn" onclick="initTimer()">SİSTEMİ BAŞLAT</button>
        </div>

        <div id="timer-ui" style="display:none;">
            <div class="timing-board">
                <div class="timing-header">
                    <div class="team-indicator"></div>
                    <div class="driver-name" id="ui-name">ADA</div>
                </div>
                <div class="timing-content">
                    <div class="current-time" id="ui-time">0.000<span class="delta" id="ui-delta"></span></div>
                    <div class="best-lap-container">
                        <span class="best-time" id="ui-record-time">0.245</span>
                        <span class="best-driver" id="ui-record-name">PIASTRI</span>
                    </div>
                </div>
                <div class="status-bar">
                    <div id="s1" class="sector"></div>
                    <div id="s2" class="sector"></div>
                    <div id="s3" class="sector"></div>
                </div>
            </div>
            <div id="start-zone" onclick="handleTimerClick()">BAŞLAMAK İÇİN TIKLA</div>
        </div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // PARTICLES-JS
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#27f4d2" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.4 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#3671c6", "opacity": 0.3, "width": 1 },
            "move": { "speed": 1.5 }
        },
        "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
    });

    // HARİTA MANTIĞI
    var aktifKatman = "nufus";
    var katmanlar = [];
    var map = L.map('map').setView([41.398, 27.35], 13);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    var drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems } });
    map.addControl(drawControl);
    map.on(L.Draw.Event.CREATED, function (e) { drawnItems.addLayer(e.layer); });

    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.4120, lon:27.3508, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981, lon:27.3491, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kurtuluş",lat:41.3989, lon:27.3565, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Siteler",lat:41.3966, lon:27.3570, nufus:7600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yıldız",lat:41.3982, lon:27.3659, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"İnönü",lat:41.4019, lon:27.3600, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kocasinan",lat:41.4068, lon:27.3453, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gündoğu",lat:41.4082, lon:27.3630, nufus:6700, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Atatürk",lat:41.4033, lon:27.3697, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Güneş",lat:41.4058, lon:27.3698, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Cumhuriyet",lat:41.4139, lon:27.3592, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Barış",lat:41.4116, lon:27.3598, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}
    ];

    function popupIcerik(m) {
        let txt = `<b>${m.name} Mahallesi</b>`;
        if(aktifKatman==="nufus") txt += `Nüfus: ${m.nufus}`;
        else if(aktifKatman==="yas") txt += `Yaş Grubu: ${m.yas}`;
        else if(aktifKatman==="medeni") txt += `Durum: ${m.medeni}`;
        else if(aktifKatman==="egitim") txt += `Eğitim: ${m.egitim}`;
        return txt;
    }

    mahalleler.forEach(m => {
        var circle = L.circleMarker([m.lat, m.lon], {
            radius: 12, color: "#222", fillColor: "#cccccc", fillOpacity: 0.9, weight: 2
        }).addTo(map);
        circle.veri = m;
        circle.on("click", () => {
            circle.bindPopup(popupIcerik(circle.veri)).openPopup();
        });
        katmanlar.push(circle);
    });

    window.gosterNufus = () => { aktifKatman = "nufus"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.nufus > 7000 ? "#800026" : "#FD8D3C"})); };
    window.gosterYas = () => { aktifKatman = "yas"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.yas === "65+" ? "#253494" : "#41b6c4"})); };
    window.gosterMedeni = () => { aktifKatman = "medeni"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.medeni === "Evli" ? "#6a0dad" : "#ff1493"})); };
    window.gosterEgitim = () => { aktifKatman = "egitim"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.egitim === "Lisans" ? "#0000FF" : "#008000"})); };
    window.resetMap = () => { katmanlar.forEach(k => k.setStyle({fillColor: "#cccccc"})); drawnItems.clearLayers(); };

    // DÖVİZ MANTIĞI
    const countries = ["USD","EUR","GBP","TRY","JPY","AUD","CAD","CHF","CNY","HKD","NZD","SEK","KRW","SGD","NOK","MXN","INR","RUB","ZAR","BRL","TWD","DKK","PLN","THB","IDR","HUF","CZK","ILS","CLP","PHP","AED","COP","SAR","MYR","RON","VND","KWD","BHD","EGP","PKR","IQD","QAR","AZN","KZT","UAH","DZD","MAD","LBP","JOD","OMR"];
    const f = document.getElementById('fromCurrency'), t = document.getElementById('toCurrency');
    countries.sort().forEach(c => {
        f.add(new Option(c, c, c==="TRY"));
        t.add(new Option(c, c, c==="USD"));
    });
    f.value = "TRY"; t.value = "USD";

    async function convertCurrency() {
        const a = document.getElementById('amount').value, res = document.getElementById('result');
        if(!a || a <= 0) return;
        res.innerText = "...";
        try {
            const data = await (await fetch(`https://open.er-api.com/v6/latest/${f.value}`)).json();
            const val = (a * data.rates[t.value]).toLocaleString('tr-TR', {minimumFractionDigits: 2});
            res.innerText = `${a} ${f.value} = ${val} ${t.value}`;
        } catch(e) { res.innerText = "HATA!"; }
    }

    // REACTION TIMER LOGIC
    let pilotName = "";
    let bestTime = Infinity;
    let record = { name: "PIASTRI", time: 0.245 };
    let startTime, isWaiting = false, timeout;

    function initTimer() {
        const val = document.getElementById('p-name').value;
        if(!val) return;
        pilotName = val.toUpperCase();
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        document.getElementById('ui-name').innerText = pilotName;
        updateRecordUI();
    }

    function updateRecordUI() {
        document.getElementById('ui-record-time').innerText = record.time.toFixed(3);
        document.getElementById('ui-record-name').innerText = record.name;
    }

    function handleTimerClick() {
        const zone = document.getElementById('start-zone');
        if(!isWaiting && zone.innerText !== "TIKLA!") {
            zone.innerText = "IŞIKLARIN SÖNMESİNİ BEKLE...";
            zone.classList.add('ready');
            isWaiting = true;
            timeout = setTimeout(() => {
                zone.innerText = "TIKLA!";
                zone.classList.remove('ready');
                zone.classList.add('go');
                startTime = performance.now();
                isWaiting = false;
            }, Math.random() * 3000 + 2000);
        } else if (isWaiting) {
            clearTimeout(timeout);
            isWaiting = false;
            zone.innerText = "HATALI ÇIKIŞ! TEKRAR TIKLA";
            zone.classList.remove('ready');
        } else if (zone.innerText === "TIKLA!") {
            const reaction = (performance.now() - startTime) / 1000;
            processReaction(reaction);
            zone.innerText = "TEKRAR DENEMEK İÇİN TIKLA";
            zone.classList.remove('go');
        }
    }

    function processReaction(t) {
        const display = document.getElementById('ui-time');
        const delta = document.getElementById('ui-delta');
        const s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), s3 = document.getElementById('s3');
        
        let color = "yellow";
        let diff = t - record.time;

        if (t < record.time) {
            color = "purple";
            record = { name: pilotName, time: t };
            updateRecordUI();
        } else if (t < bestTime) {
            color = "green";
        }
        
        bestTime = Math.min(bestTime, t);
        display.className = "current-time " + color;
        display.innerHTML = t.toFixed(3) + `<span class="delta">${diff > 0 ? '+' : ''}${diff.toFixed(3)}</span>`;
        
        [s1, s2, s3].forEach(s => s.className = "sector bg-" + color);
    }
</script>
</body>
</html>
