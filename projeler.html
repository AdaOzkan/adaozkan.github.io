<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Bold';
            src: url('Formula1-Bold_web.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        
        nav a { 
            color: white; 
            margin-left: 25px; 
            text-decoration: none; 
            font-size: 14px; 
            transition: 0.3s; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        nav a:hover { color: #27f4d2; }

        .main-container {
            margin: 30px auto;
            max-width: 1200px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px;
            border: 1px solid #222;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffffff;
        }

        /* REACTION TELEMETRY STYLES */
        .rt-section { margin-top: 40px; padding-top: 30px; border-top: 1px solid #333; }
        .timing-board { background: #0d0d0d; border: 1px solid #333; max-width: 550px; margin: 20px auto; border-radius: 10px; overflow: hidden; }
        .timing-header { background: #15151e; padding: 12px 15px; display: flex; align-items: center; border-bottom: 2px solid #333; }
        .team-indicator { width: 4px; height: 18px; background: #e8002d; margin-right: 10px; }
        .driver-name { font-family: 'F1Black', sans-serif; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
        
        .timing-content { padding: 25px; display: flex; justify-content: space-between; align-items: baseline; }
        .current-time { font-family: 'F1Bold', sans-serif; font-size: 48px; position: relative; }
        .delta { font-family: 'F1Regular', sans-serif; font-size: 16px; margin-left: 10px; vertical-align: middle; }
        
        .best-lap-container { text-align: right; }
        .best-time { font-family: 'F1Bold', sans-serif; font-size: 22px; display: block; }
        .best-label { font-family: 'F1Regular', sans-serif; font-size: 12px; color: #888; text-transform: uppercase; }

        .status-bar { height: 6px; width: 100%; background: #222; display: flex; }
        .sector { flex: 1; border-right: 1px solid #000; transition: 0.3s; }

        #start-zone { 
            width: 100%; height: 120px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 15px; margin-top: 15px; font-family: 'F1Black', sans-serif; border: 2px dashed #444; transition: 0.2s;
            text-align: center;
        }
        .ready { background: #e8002d !important; color: white; border-style: solid !important; }
        .go { background: #00ff00 !important; color: black !important; border-style: solid !important; }

        /* RENKLER */
        .purple { color: #b15efb !important; } .bg-purple { background: #b15efb !important; }
        .green { color: #00ff00 !important; }  .bg-green { background: #00ff00 !important; }
        .yellow { color: #fff000 !important; } .bg-yellow { background: #fff000 !important; }

        footer { text-align: center; padding: 40px; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="projeler.html" style="color: #27f4d2;"><i class="fa-solid fa-layer-group"></i> Projects</a>
    </nav>
</header>

<div class="main-container">
    <div class="rt-section">
        <h2>Reaction Telemetry</h2>
        
        <div id="setup-panel" style="text-align:center; padding: 20px;">
            <label style="text-align:center; font-family: 'F1Black'; font-size: 12px; color: #27f4d2; display: block; margin-bottom: 10px;">PİLOT İSMİ GİRİNİZ</label>
            <input type="text" id="p-name" placeholder="ÖRN: ÖZKAN" style="text-align:center; width: 250px; margin: 0 auto 15px auto; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-family: 'F1Regular';">
            <br>
            <button onclick="initTimer()" style="background: #27f4d2; color: #000; font-family: 'F1Black'; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; transition: 0.3s;">SİSTEMİ BAŞLAT</button>
        </div>

        <div id="timer-ui" style="display:none;">
            <div class="timing-board">
                <div class="timing-header">
                    <div class="team-indicator"></div>
                    <div class="driver-name" id="ui-name">ADA</div>
                </div>
                <div class="timing-content">
                    <div class="current-time" id="ui-time">0.000</div>
                    <div class="best-lap-container">
                        <span class="best-time" id="ui-record-time">0.000</span>
                        <span class="best-label">BEST TIME</span>
                    </div>
                </div>
                <div class="status-bar">
                    <div id="s1" class="sector"></div>
                    <div id="s2" class="sector"></div>
                    <div id="s3" class="sector"></div>
                </div>
            </div>
            <div id="start-zone" onclick="handleTimerClick()">BAŞLAMAK İÇİN TIKLA</div>
        </div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    // Arkaplan Parçacıkları
    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": "#27f4d2" }, "shape": { "type": "circle" }, "opacity": { "value": 0.4 }, "size": { "value": 3 }, "line_linked": { "enable": true, "distance": 150, "color": "#3671c6", "opacity": 0.3, "width": 1 }, "move": { "speed": 1.5 } } });

    let pilotName = "";
    let myBestTime = Infinity;
    let globalRecord = 0.245; 
    let startTime, isWaiting = false, timeout;

    function initTimer() {
        const val = document.getElementById('p-name').value;
        if(!val) return;
        pilotName = val.toUpperCase();
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('timer-ui').style.display = 'block';
        document.getElementById('ui-name').innerText = pilotName;
    }

    function handleTimerClick() {
        const zone = document.getElementById('start-zone');
        if(!isWaiting && zone.innerText !== "TIKLA!") {
            zone.innerText = "BEKLE...";
            zone.classList.add('ready');
            isWaiting = true;
            timeout = setTimeout(() => {
                zone.innerText = "TIKLA!";
                zone.classList.remove('ready');
                zone.classList.add('go');
                startTime = performance.now();
                isWaiting = false;
            }, Math.random() * 3000 + 2000);
        } else if (isWaiting) {
            clearTimeout(timeout);
            isWaiting = false;
            zone.innerText = "HATALI ÇIKIŞ! TEKRAR TIKLA";
            zone.classList.remove('ready');
        } else if (zone.innerText === "TIKLA!") {
            const reaction = (performance.now() - startTime) / 1000;
            processReaction(reaction);
            zone.innerText = "TEKRAR DENEMEK İÇİN TIKLA";
            zone.classList.remove('go');
        }
    }

    function processReaction(t) {
        const display = document.getElementById('ui-time');
        const recordDisplay = document.getElementById('ui-record-time');
        const s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), s3 = document.getElementById('s3');
        
        let color = "yellow";
        let isFirstRun = (myBestTime === Infinity);
        
        // Renk Mantığı
        if (!isFirstRun && t < myBestTime) {
            color = "purple"; // Kendi rekorunu kırdın
        } else if (t < globalRecord) {
            color = "green"; // Global rekorun (0.245) altındasın
        }

        // Sembol ve Fark Hesaplama
        let sign = "";
        let diff = 0;
        if (!isFirstRun) {
            diff = Math.abs(t - myBestTime);
            // Yeşil veya Morsa (-) koy, Sarıysa (+) koy
            sign = (color === "purple" || color === "green") ? "-" : "+";
        }

        // Kendi en iyi sonucunu güncelle
        if (t < myBestTime) {
            myBestTime = t;
            recordDisplay.innerText = myBestTime.toFixed(3);
        }
        
        // Ekranı Güncelle
        display.className = "current-time " + color;
        let deltaHtml = !isFirstRun ? `<span class="delta">${sign}${diff.toFixed(3)}</span>` : "";
        display.innerHTML = t.toFixed(3) + deltaHtml;

        // Sektör ışıklarını güncelle
        [s1, s2, s3].forEach(s => s.className = "sector bg-" + color);
    }
</script>
</body>
</html>
