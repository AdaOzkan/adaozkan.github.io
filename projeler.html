<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            overflow: hidden; 
        }

        /* HEADER */
        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: relative;
            z-index: 1001;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        /* HARİTA VE PANEL */
        #map { height: calc(100vh - 71px); width: 100%; z-index: 1; }

        .panel {
            position: absolute;
            top: 90px;
            left: 20px;
            background: rgba(15, 15, 15, 0.95);
            padding: 15px;
            z-index: 1000;
            border-radius: 12px;
            border: 1px solid #3671c6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .panel-title {
            color: #27f4d2;
            font-family: 'F1Black', sans-serif;
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        button {
            margin: 4px;
            padding: 8px 12px;
            border: 1px solid #27f4d2;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 11px;
            transition: 0.3s;
        }

        button:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }
        .reset-btn:hover { background: #e8002d !important; color: white !important; }

        /* HARİTA POPUP AYARLARI */
        .leaflet-popup-content-wrapper {
            background: #1a1a1a !important;
            color: white !important;
            font-family: 'F1Regular', sans-serif;
            border: 1px solid #3671c6;
        }
        .leaflet-popup-tip { background: #1a1a1a !important; }
        .leaflet-top.leaflet-left { top: 220px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div id="map"></div>

<div class="panel">
    <div class="panel-title">VERİ ANALİZİ</div>
    <button onclick="gosterNufus()">Nüfus</button>
    <button onclick="gosterYas()">Yaş</button>
    <button onclick="gosterMedeni()">Medeni</button>
    <button onclick="gosterEgitim()">Eğitim</button>
    <button onclick="resetMap()" class="reset-btn">Temizle</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    var aktifKatman = "nufus";
    var katmanlar = [];
    
    // Haritayı başlat
    var map = L.map('map').setView([41.398, 27.35], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Çizim araçları
    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    var drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems } });
    map.addControl(drawControl);
    map.on(L.Draw.Event.CREATED, function (e) { drawnItems.addLayer(e.layer); });

    // Mahalle verileri
    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.4120, lon:27.3508, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981, lon:27.3491, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kurtuluş",lat:41.3989, lon:27.3565, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Siteler",lat:41.3966, lon:27.3570, nufus:7600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yıldız",lat:41.3982, lon:27.3659, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"İnönü",lat:41.4019, lon:27.3600, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kocasinan",lat:41.4068, lon:27.3453, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gündoğu",lat:41.4082, lon:27.3630, nufus:6700, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Atatürk",lat:41.4033, lon:27.3697, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Güneş",lat:41.4058, lon:27.3698, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Cumhuriyet",lat:41.4139, lon:27.3592, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Barış",lat:41.4116, lon:27.3598, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}
    ];

    function popupIcerik(m) {
        let icerik = `<b>${m.name} Mahallesi</b><br>`;
        if(aktifKatman==="nufus") icerik += `Nüfus: ${m.nufus}`;
        else if(aktifKatman==="yas") icerik += `Yaş Grubu: ${m.yas}`;
        else if(aktifKatman==="medeni") icerik += `Medeni Durum: ${m.medeni}`;
        else if(aktifKatman==="egitim") icerik += `Eğitim: ${m.egitim}`;
        return icerik;
    }

    // Noktaları oluştur
    mahalleler.forEach(function(m){
        var circle = L.circleMarker([m.lat, m.lon], {
            radius: 16,
            color: "#222",
            fillColor: "#cccccc",
            fillOpacity: 0.9,
            weight: 2
        }).addTo(map);

        circle.veri = m;
        circle.on("click", function() {
            circle.bindPopup(popupIcerik(circle.veri)).openPopup();
        });
        katmanlar.push(circle);
    });

    // Renk Fonksiyonları
    function renkNufus(n) {
        return n > 9000 ? "#800026" : n > 7000 ? "#BD0026" : n > 5000 ? "#E31A1C" : n > 3000 ? "#FC4E2A" : "#FD8D3C";
    }

    function renkYas(y) {
        if(y === "40-44") return "#41b6c4";
        if(y === "65+") return "#253494";
        return "#969696";
    }

    function renkEgitim(e) {
        if(e === "Lisans") return "#0000FF";
        if(e === "Lise") return "#008000";
        if(e === "İlkokul") return "#FFD700";
        return "#999999";
    }

    // Buton Tetikleyicileri
    window.gosterNufus = function() {
        aktifKatman = "nufus";
        katmanlar.forEach(k => k.setStyle({fillColor: renkNufus(k.veri.nufus)}));
    };

    window.gosterYas = function() {
        aktifKatman = "yas";
        katmanlar.forEach(k => k.setStyle({fillColor: renkYas(k.veri.yas)}));
    };

    window.gosterMedeni = function() {
        aktifKatman = "medeni";
        katmanlar.forEach(k => {
            let renk = k.veri.medeni === "Evli" ? "#6a0dad" : "#ff1493";
            k.setStyle({fillColor: renk});
        });
    };

    window.gosterEgitim = function() {
        aktifKatman = "egitim";
        katmanlar.forEach(k => k.setStyle({fillColor: renkEgitim(k.veri.egitim)}));
    };

    window.resetMap = function() {
        aktifKatman = "nufus";
        katmanlar.forEach(k => k.setStyle({fillColor: "#cccccc"}));
        drawnItems.clearLayers();
    };
</script>

</body>
</html>
