<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            position: relative;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        /* PROJE KUTUSU (DİKDÖRTGENLER) */
        .project-card {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px;
            border: 1px solid #222;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 25px;
            font-size: 20px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HARİTA BÖLÜMÜ */
        #map { 
            width: 100%; 
            height: 450px;
            border-radius: 15px;
            z-index: 1; 
        }

        .map-panel {
            position: absolute;
            top: 115px;
            left: 55px;
            background: rgba(10, 10, 10, 0.9);
            padding: 10px;
            z-index: 1000;
            border-radius: 12px;
            border: 1px solid #3671c6;
        }

        .map-btn {
            margin: 2px;
            padding: 8px 10px;
            border: 1px solid #27f4d2;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        .map-btn:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        /* CURRENCY CONVERTER TASARIMI */
        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: #27f4d2; font-family: 'F1Black', sans-serif; }

        input, select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-family: 'F1Regular', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: #27f4d2; box-shadow: 0 0 10px rgba(39, 244, 210, 0.2); }

        .result-display {
            margin-top: 30px;
            padding: 20px;
            background: rgba(39, 244, 210, 0.05);
            border-radius: 12px;
            font-family: 'F1Black', sans-serif;
            font-size: 22px;
            color: #27f4d2;
            text-align: center;
            border: 1px dashed rgba(39, 244, 210, 0.3);
        }

        .convert-btn {
            background: #27f4d2;
            color: #000;
            font-family: 'F1Black', sans-serif;
            border: none;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .convert-btn:hover { background: #fff; transform: translateY(-2px); }

        footer { text-align: center; padding: 40px; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div class="project-card">
    <h2>Project 01 // Mahalle Veri Analizi</h2>
    <div class="map-panel">
        <button class="map-btn" onclick="gosterNufus()">Nüfus</button>
        <button class="map-btn" onclick="gosterYas()">Yaş</button>
        <button class="map-btn" onclick="gosterMedeni()">Medeni</button>
        <button class="map-btn" onclick="gosterEgitim()">Eğitim</button>
        <button class="map-btn reset-btn" onclick="resetMap()">Sıfırla</button>
    </div>
    <div id="map"></div>
</div>

<div class="project-card">
    <h2>Project 02 // Global Currency Converter</h2>
    <div class="converter-grid">
        <div class="input-group">
            <label>MİKTAR</label>
            <input type="number" id="amount" value="1" step="any">
        </div>
        <div class="input-group">
            <label>KAYNAK</label>
            <select id="fromCurrency"></select>
        </div>
        <div class="input-group">
            <label>HEDEF</label>
            <select id="toCurrency"></select>
        </div>
        <button class="convert-btn" onclick="convertCurrency()">HESAPLA</button>
    </div>
    <div class="result-display" id="result">LÜTFEN MİKTAR GİRİN</div>
</div>

<footer>© 2026 ADA OZKAN • PROJECT SHOWCASE</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 50 PARA BİRİMİ LİSTESİ
    const currencies = [
        {code: "USD", name: "ABD Doları"}, {code: "EUR", name: "Euro"}, {code: "GBP", name: "İngiliz Sterlini"},
        {code: "TRY", name: "Türk Lirası"}, {code: "JPY", name: "Japon Yeni"}, {code: "AUD", name: "Avustralya Doları"},
        {code: "CAD", name: "Kanada Doları"}, {code: "CHF", name: "İsviçre Frangı"}, {code: "CNY", name: "Çin Yuanı"},
        {code: "HKD", name: "Hong Kong Doları"}, {code: "NZD", name: "Yeni Zelanda Doları"}, {code: "SEK", name: "İsveç Kronu"},
        {code: "KRW", name: "Güney Kore Wonu"}, {code: "SGD", name: "Singapur Doları"}, {code: "NOK", name: "Norveç Kronu"},
        {code: "MXN", name: "Meksika Pesosu"}, {code: "INR", name: "Hindistan Rupisi"}, {code: "RUB", name: "Rus Rublesi"},
        {code: "ZAR", name: "Güney Afrika Randı"}, {code: "BRL", name: "Brezilya Reali"}, {code: "TWD", name: "Tayvan Doları"},
        {code: "DKK", name: "Danimarka Kronu"}, {code: "PLN", name: "Polonya Zlotisi"}, {code: "THB", name: "Tayland Bahtı"},
        {code: "IDR", name: "Endonezya Rupiahı"}, {code: "HUF", name: "Macar Forinti"}, {code: "CZK", name: "Çek Korunası"},
        {code: "ILS", name: "İsrail Şekeli"}, {code: "CLP", name: "Şili Pesosu"}, {code: "PHP", name: "Filipinler Pesosu"},
        {code: "AED", name: "BAE Dirhemi"}, {code: "COP", name: "Kolombiya Pesosu"}, {code: "SAR", name: "Suudi Arabistan Riyali"},
        {code: "MYR", name: "Malezya Ringgiti"}, {code: "RON", name: "Romen Leyi"}, {code: "VND", name: "Vietnam Dongu"},
        {code: "KWD", name: "Kuveyt Dinarı"}, {code: "BHD", name: "Bahreyn Dinarı"}, {code: "EGP", name: "Mısır Lirası"},
        {code: "PKR", name: "Pakistan Rupisi"}, {code: "IQD", name: "Irak Dinarı"}, {code: "QAR", name: "Katar Riyali"},
        {code: "AZN", name: "Azerbaycan Manatı"}, {code: "KZT", name: "Kazakistan Tengesi"}, {code: "UAH", name: "Ukrayna Grivnası"},
        {code: "DZD", name: "Cezayir Dinarı"}, {code: "MAD", name: "Fas Dirhemi"}, {code: "LBP", name: "Lübnan Lirası"},
        {code: "JOD", name: "Ürdün Dinarı"}, {code: "OMR", name: "Umman Riyali"}
    ];

    function populateCurrencies() {
        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        currencies.forEach(c => {
            let opt1 = new Option(`${c.code} - ${c.name}`, c.code);
            if(c.code === "TRY") opt1.selected = true;
            fromSelect.add(opt1);
            let opt2 = new Option(`${c.code} - ${c.name}`, c.code);
            if(c.code === "USD") opt2.selected = true;
            toSelect.add(opt2);
        });
    }
    populateCurrencies();

    async function convertCurrency() {
        const amount = document.getElementById('amount').value;
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const resultDiv = document.getElementById('result');
        if (!amount || amount <= 0) { resultDiv.innerText = "GEÇERSİZ MİKTAR"; return; }
        resultDiv.innerText = "GÜNCEL KUR ALINIYOR...";
        try {
            const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await response.json();
            if (data.result === "success") {
                const rate = data.rates[to];
                const converted = (amount * rate).toLocaleString('tr-TR', { minimumFractionDigits: 2 });
                resultDiv.innerText = `${amount} ${from} = ${converted} ${to}`;
            }
        } catch (e) { resultDiv.innerText = "BAĞLANTI HATASI"; }
    }

    // PARTICLES-JS
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 100 },
            "color": { "value": "#27f4d2" },
            "line_linked": { "color": "#3671c6", "opacity": 0.3 },
            "move": { "speed": 1.5 }
        }
    });

    // HARİTA
    var map = L.map('map').setView([41.398, 27.35], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var katmanlar = [];
    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300}
        // ... diğer mahalleleri buraya ekleyebilirsin
    ];
    mahalleler.forEach(m => {
        let c = L.circleMarker([m.lat, m.lon], {radius: 12, fillColor: "#cccccc", fillOpacity: 0.9, color: "#000"}).addTo(map);
        c.bindPopup(`<b>${m.name}</b>`);
        katmanlar.push({circle: c, veri: m});
    });

    window.gosterNufus = () => katmanlar.forEach(k => k.circle.setStyle({fillColor: k.veri.nufus > 7000 ? "#e8002d" : "#27f4d2"}));
    window.resetMap = () => katmanlar.forEach(k => k.circle.setStyle({fillColor: "#cccccc"}));
</script>

</body>
</html>
