<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            min-height: 100vh;
            position: relative;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }

        /* HEADER */
        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        /* ANA KONTEYNER */
        .main-container {
            margin: 30px auto;
            max-width: 1200px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px;
            border: 1px solid #222;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffffff;
        }

        #map { width: 100%; height: 450px; border-radius: 15px; z-index: 1; }

        .panel {
            position: absolute; top: 100px; left: 45px;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px; z-index: 1000;
            border-radius: 12px; border: 1px solid #3671c6;
        }

        button.map-btn {
            margin: 3px; padding: 8px 10px;
            border: 1px solid #27f4d2; border-radius: 6px;
            cursor: pointer; background: transparent; color: #27f4d2;
            font-family: 'F1Regular', sans-serif; font-size: 10px; transition: 0.3s;
        }
        button.map-btn:hover { background: #27f4d2; color: #000; }

        /* POPUP ÖZELLEŞTİRME */
        .leaflet-popup-content-wrapper { background: #1a1a1a !important; color: #fff !important; border: 1px solid #3671c6; font-family: 'F1Regular', sans-serif; }
        .leaflet-popup-content b { font-family: 'F1Black', sans-serif; color: #27f4d2; }

        /* DÖVİZ BÖLÜMÜ */
        .currency-section { margin-top: 30px; padding-top: 30px; border-top: 1px solid #333; }
        .converter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; align-items: end; }
        label { font-family: 'F1Black', sans-serif; font-size: 11px; color: #27f4d2; margin-bottom: 8px; display: block; }
        
        input, select {
            width: 100%; background: #111; border: 1px solid #444; color: white;
            padding: 12px; border-radius: 10px; font-family: 'F1Regular', sans-serif;
        }

        /* Select içindeki option'lar için font desteği */
        select option { font-family: 'F1Regular', sans-serif; background: #111; }

        .calc-btn {
            background: #27f4d2; color: #000; font-family: 'F1Black', sans-serif;
            border: none; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .calc-btn:hover { background: #fff; }

        .result-display {
            margin-top: 20px; padding: 20px; background: rgba(39, 244, 210, 0.05);
            border-radius: 12px; text-align: center; font-family: 'F1Black', sans-serif;
            font-size: 22px; color: #27f4d2; border: 1px dashed #27f4d2;
        }

        footer { text-align: center; padding: 40px; font-family: 'F1Black', sans-serif; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div class="main-container">
    <h2>Mahalle Veri Analizi</h2>
    <div class="panel">
        <button class="map-btn" onclick="gosterNufus()">Nüfus</button>
        <button class="map-btn" onclick="gosterYas()">Yaş</button>
        <button class="map-btn" onclick="gosterMedeni()">Medeni</button>
        <button class="map-btn" onclick="gosterEgitim()">Eğitim</button>
        <button class="map-btn" style="border-color:#e8002d; color:#e8002d;" onclick="resetMap()">Temizle</button>
    </div>
    <div id="map"></div>

    <div class="currency-section">
        <h2>Global Currency Converter</h2>
        <div class="converter-grid">
            <div>
                <label>MİKTAR</label>
                <input type="number" id="amount" value="1">
            </div>
            <div>
                <label>KAYNAK BİRİM</label>
                <select id="fromCurrency"></select>
            </div>
            <div>
                <label>HEDEF BİRİM</label>
                <select id="toCurrency"></select>
            </div>
            <button class="calc-btn" onclick="convertCurrency()">HESAPLA</button>
        </div>
        <div class="result-display" id="result">VERİLERİ GİRİNİZ</div>
    </div>
</div>

<footer>© 2026 ADA OZKAN • DATA PERFORMANCE</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // PARTICLES
    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "color": { "value": "#27f4d2" }, "line_linked": { "color": "#3671c6" }, "move": { "speed": 1.5 } } });

    // HARİTA
    var aktifKatman = "nufus";
    var katmanlar = [];
    var map = L.map('map').setView([41.398, 27.35], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    var drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems } });
    map.addControl(drawControl);

    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.4120, lon:27.3508, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981, lon:27.3491, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"}
    ];

    mahalleler.forEach(m => {
        var circle = L.circleMarker([m.lat, m.lon], { radius: 12, fillColor: "#cccccc", fillOpacity: 0.9, color: "#222" }).addTo(map);
        circle.on("click", () => {
            let txt = `<b>${m.name} Mahallesi</b><br>Veri: ${m[aktifKatman] || m.nufus}`;
            circle.bindPopup(txt).openPopup();
        });
        katmanlar.push(circle);
    });

    window.gosterNufus = () => { aktifKatman="nufus"; katmanlar.forEach(k=>k.setStyle({fillColor: k.veri?.nufus > 7000 ? "#800026" : "#FD8D3C"})); };
    window.resetMap = () => { katmanlar.forEach(k=>k.setStyle({fillColor:"#cccccc"})); drawnItems.clearLayers(); };

    // DÖVİZ (50 Ülke + Tam İsimler)
    const currencyNames = {
        "USD": "ABD Doları", "EUR": "Euro", "GBP": "İngiliz Sterlini", "TRY": "Türk Lirası", "JPY": "Japon Yeni",
        "AUD": "Avustralya Doları", "CAD": "Kanada Doları", "CHF": "İsviçre Frangı", "CNY": "Çin Yuanı", "HKD": "Hong Kong Doları",
        "NZD": "Yeni Zelanda Doları", "SEK": "İsveç Kronu", "KRW": "Güney Kore Wonu", "SGD": "Singapur Doları", "NOK": "Norveç Kronu",
        "MXN": "Meksika Pesosu", "INR": "Hindistan Rupisi", "RUB": "Rus Rublesi", "ZAR": "Güney Afrika Randı", "BRL": "Brezilya Reali",
        "TWD": "Tayvan Doları", "DKK": "Danimarka Kronu", "PLN": "Polonya Zlotisi", "THB": "Tayland Bahtı", "IDR": "Endonezya Rupiahı",
        "HUF": "Macar Forinti", "CZK": "Çek Korunası", "ILS": "İsrail Şekeli", "CLP": "Şili Pesosu", "PHP": "Filipinler Pesosu",
        "AED": "B.A.E. Dirhemi", "COP": "Kolombiya Pesosu", "SAR": "Suudi Arabistan Riyali", "MYR": "Malezya Ringgiti", "RON": "Rumen Leyi",
        "VND": "Vietnam Dongu", "KWD": "Kuveyt Dinarı", "BHD": "Bahreyn Dinarı", "EGP": "Mısır Lirası", "PKR": "Pakistan Rupisi",
        "IQD": "Irak Dinarı", "QAR": "Katar Riyali", "AZN": "Azerbaycan Manatı", "KZT": "Kazakistan Tengesi", "UAH": "Ukrayna Grivnası",
        "DZD": "Cezayir Dinarı", "MAD": "Fas Dirhemi", "LBP": "Lübnan Lirası", "JOD": "Ürdün Dinarı", "OMR": "Umman Riyali"
    };

    function initConverter() {
        const f = document.getElementById('fromCurrency'), t = document.getElementById('toCurrency');
        Object.keys(currencyNames).sort().forEach(code => {
            let label = `${code} (${currencyNames[code]})`;
            f.add(new Option(label, code, code==="TRY"));
            t.add(new Option(label, code, code==="USD"));
        });
        f.value = "TRY"; t.value = "USD";
    }
    initConverter();

    async function convertCurrency() {
        const a = document.getElementById('amount').value, from = document.getElementById('fromCurrency').value, 
              to = document.getElementById('toCurrency').value, res = document.getElementById('result');
        if(!a || a <= 0) return;
        res.innerText = "...";
        try {
            const data = await (await fetch(`https://open.er-api.com/v6/latest/${from}`)).json();
            const val = (a * data.rates[to]).toLocaleString('tr-TR', {minimumFractionDigits: 2});
            res.innerText = `${a} ${from} = ${val} ${to}`;
        } catch(e) { res.innerText = "HATA!"; }
    }
</script>
</body>
</html>
