<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            /* YENİ STATİK ARKA PLAN: Modern ve Derinlikli */
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: white; 
            position: relative;
            min-height: 100vh;
        }

        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        /* PROJE KARTLARI */
        .project-card {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(25, 25, 25, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 25px;
            font-size: 20px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* HARİTA BÖLÜMÜ */
        #map { 
            width: 100%; 
            height: 500px;
            border-radius: 15px;
            z-index: 1; 
            border: 1px solid #333;
        }

        .map-panel {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .map-btn {
            padding: 10px 18px;
            border: 1px solid #27f4d2;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(39, 244, 210, 0.05);
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 11px;
            transition: 0.3s;
        }

        .map-btn:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        /* DÖVİZ BÖLÜMÜ */
        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: #27f4d2; font-family: 'F1Black', sans-serif; }

        input, select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-family: 'F1Regular', sans-serif;
            outline: none;
        }

        .result-display {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            font-family: 'F1Black', sans-serif;
            font-size: 22px;
            color: #27f4d2;
            text-align: center;
        }

        .convert-btn {
            background: #27f4d2;
            color: #000;
            font-family: 'F1Black', sans-serif;
            border: none;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .convert-btn:hover { background: #fff; }

        footer { text-align: center; padding: 40px; opacity: 0.3; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div class="project-card">
    <h2>Project 01 // Mahalle Veri Analizi</h2>
    <div class="map-panel">
        <button class="map-btn" onclick="gosterNufus()">Nüfus Analizi</button>
        <button class="map-btn" onclick="gosterYas()">Yaş Grubu</button>
        <button class="map-btn" onclick="gosterMedeni()">Medeni Durum</button>
        <button class="map-btn" onclick="gosterEgitim()">Eğitim Seviyesi</button>
        <button class="map-btn reset-btn" onclick="resetMap()">Filtreleri Temizle</button>
    </div>
    <div id="map"></div>
</div>

<div class="project-card">
    <h2>Project 02 // Global Currency Converter</h2>
    <div class="converter-grid">
        <div class="input-group">
            <label>MİKTAR</label>
            <input type="number" id="amount" value="1" step="any">
        </div>
        <div class="input-group">
            <label>KAYNAK</label>
            <select id="fromCurrency"></select>
        </div>
        <div class="input-group">
            <label>HEDEF</label>
            <select id="toCurrency"></select>
        </div>
        <button class="convert-btn" onclick="convertCurrency()">HESAPLA</button>
    </div>
    <div class="result-display" id="result">MİKTAR GİRİP HESAPLAYIN</div>
</div>

<footer>© 2026 ADA OZKAN • PROJECT SHOWCASE</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. HARİTA MANTIĞI (Uygulamalar/Çizim araçları kaldırıldı)
    var map = L.map('map').setView([41.398, 27.35], 13);
    
    // Karanlık mod harita stili (Daha profesyonel görünüm)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var katmanlar = [];
    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.4120, lon:27.3508, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981, lon:27.3491, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kurtuluş",lat:41.3989, lon:27.3565, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Siteler",lat:41.3966, lon:27.3570, nufus:7600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yıldız",lat:41.3982, lon:27.3659, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"İnönü",lat:41.4019, lon:27.3600, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kocasinan",lat:41.4068, lon:27.3453, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gündoğu",lat:41.4082, lon:27.3630, nufus:6700, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Atatürk",lat:41.4033, lon:27.3697, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Güneş",lat:41.4058, lon:27.3698, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Cumhuriyet",lat:41.4139, lon:27.3592, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Barış",lat:41.4116, lon:27.3598, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}
    ];

    mahalleler.forEach(function(m){
        var circle = L.circleMarker([m.lat, m.lon], {
            radius: 12,
            color: "#27f4d2",
            fillColor: "#cccccc",
            fillOpacity: 0.6,
            weight: 1
        }).addTo(map);

        circle.veri = m;
        circle.on("click", function() {
            circle.bindPopup(`<b>${m.name} Mahallesi</b>`).openPopup();
        });
        katmanlar.push(circle);
    });

    window.gosterNufus = () => katmanlar.forEach(k => k.setStyle({fillColor: k.veri.nufus > 7000 ? "#e8002d" : "#27f4d2", fillOpacity: 0.8}));
    window.gosterYas = () => katmanlar.forEach(k => k.setStyle({fillColor: k.veri.yas === "65+" ? "#3671c6" : "#27f4d2", fillOpacity: 0.8}));
    window.gosterMedeni = () => katmanlar.forEach(k => k.setStyle({fillColor: k.veri.medeni === "Evli" ? "#6a0dad" : "#ff1493", fillOpacity: 0.8}));
    window.gosterEgitim = () => katmanlar.forEach(k => k.setStyle({fillColor: k.veri.egitim === "Lisans" ? "#27f4d2" : "#999", fillOpacity: 0.8}));
    window.resetMap = () => katmanlar.forEach(k => k.setStyle({fillColor: "#cccccc", fillOpacity: 0.6}));

    // 2. DÖVİZ MANTIĞI
    const currencies = [
        {code: "USD", name: "ABD Doları"}, {code: "EUR", name: "Euro"}, {code: "GBP", name: "İngiliz Sterlini"},
        {code: "TRY", name: "Türk Lirası"}, {code: "JPY", name: "Japon Yeni"}, {code: "SAR", name: "Suudi Riyali"},
        {code: "AZN", name: "Azerbaycan Manatı"}, {code: "RUB", name: "Rus Rublesi"}
    ]; // Örnek olarak kısaltıldı, hepsini buraya ekleyebilirsin.

    function populateCurrencies() {
        const from = document.getElementById('fromCurrency');
        const to = document.getElementById('toCurrency');
        currencies.forEach(c => {
            from.add(new Option(`${c.code} - ${c.name}`, c.code, c.code === "TRY"));
            to.add(new Option(`${c.code} - ${c.name}`, c.code, c.code === "USD"));
        });
        from.value = "TRY"; to.value = "USD";
    }
    populateCurrencies();

    async function convertCurrency() {
        const amount = document.getElementById('amount').value;
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const res = document.getElementById('result');
        if (!amount || amount <= 0) return;
        res.innerText = "HESAPLANIYOR...";
        try {
            const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await response.json();
            const rate = data.rates[to];
            res.innerText = `${amount} ${from} = ${(amount * rate).toLocaleString('tr-TR')} ${to}`;
        } catch (e) { res.innerText = "HATA OLUŞTU"; }
    }
</script>

</body>
</html>
