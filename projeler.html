<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        /* FONT VE GENEL TASARIM */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            /* STATİK DERİNLİKLİ ARKA PLAN */
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white; 
            min-height: 100vh;
            position: relative;
        }

        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'FBlack', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        /* PROJE KARTLARI (YUVARLATILMIŞ DİKDÖRTGENLER) */
        .project-card {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px; /* İstediğin yuvarlatılmış köşe */
            border: 1px solid #222;
            padding: 35px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: 'FBlack', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 25px;
            font-size: 18px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* HARİTA BÖLÜMÜ */
        #map { 
            width: 100%; 
            height: 450px;
            border-radius: 15px;
            z-index: 1; 
        }

        .map-panel {
            position: absolute;
            top: 115px;
            left: 55px;
            background: rgba(10, 10, 10, 0.9);
            padding: 10px;
            z-index: 1000;
            border-radius: 12px;
            border: 1px solid #3671c6;
        }

        .map-btn {
            margin: 2px;
            padding: 8px 10px;
            border: 1px solid #27f4d2;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        .map-btn:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        /* DÖVİZ ARACI TASARIMI */
        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: #27f4d2; font-family: 'FBlack', sans-serif; }

        input, select {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: 'F1Regular', sans-serif;
            outline: none;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(39, 244, 210, 0.1);
            border-radius: 12px;
            text-align: center;
            font-family: 'FBlack', sans-serif;
            color: #27f4d2;
            font-size: 20px;
        }

        .calc-btn {
            background: #27f4d2;
            color: #000;
            font-family: 'FBlack', sans-serif;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        footer { text-align: center; padding: 40px; font-family: 'FBlack', sans-serif; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div class="project-card">
    <h2>Project 01 // Mahalle Veri Analizi</h2>
    <div class="map-panel">
        <button class="map-btn" onclick="gosterNufus()">Nüfus</button>
        <button class="map-btn" onclick="gosterYas()">Yaş</button>
        <button class="map-btn" onclick="gosterMedeni()">Medeni</button>
        <button class="map-btn" onclick="gosterEgitim()">Eğitim</button>
        <button class="map-btn reset-btn" onclick="resetMap()">Sıfırla</button>
    </div>
    <div id="map"></div>
</div>

<div class="project-card">
    <h2>Project 02 // Global Currency Converter</h2>
    <div class="converter-grid">
        <div class="input-group">
            <label>MİKTAR</label>
            <input type="number" id="amount" value="1">
        </div>
        <div class="input-group">
            <label>KAYNAK</label>
            <select id="fromCurrency"></select>
        </div>
        <div class="input-group">
            <label>HEDEF</label>
            <select id="toCurrency"></select>
        </div>
        <button class="calc-btn" onclick="convertCurrency()">HESAPLA</button>
    </div>
    <div class="result-box" id="result">Lütfen Hesaplama Yapın</div>
</div>

<footer>© 2026 ADA OZKAN • PERFORMANCE PORTFOLIO</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- HARİTA MANTIĞI (Senin Orijinal Kodun) ---
    var aktifKatman = "nufus";
    var map = L.map('map').setView([41.398, 27.35], 13);
    
    // Klasik Harita Stili (İlk halindeki gibi)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var katmanlar = [];
    var mahalleler = [
        {name:"Sevgi",lat:41.391902631712775, lon:27.345482596083997, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.39016369400948, lon:27.35491889453962, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.40317234004511, lon:27.342456427165533, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.41200749237624, lon:27.350804559672905, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.40909876762109, lon:27.332197473456567, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981623139793, lon:27.34915056866236, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kurtuluş",lat:41.39892904839235, lon:27.35650302210077, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Siteler",lat:41.39668481042163, lon:27.357024645687474, nufus:7600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yıldız",lat:41.398276436690466, lon:27.365913598817414, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"İnönü",lat:41.401995612178276, lon:27.36003874485168, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kocasinan",lat:41.40688241099159, lon:27.345369174010454, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gündoğu",lat:41.40827232000609, lon:27.363003091831168, nufus:6700, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Atatürk",lat:41.40333318502777, lon:27.36971906416532, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Güneş",lat:41.40588323642748, lon:27.369804843022905, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Cumhuriyet",lat:41.41394508744789, lon:27.359282432239283, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Barış",lat:41.41162289907757, lon:27.359820182990884, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}
    ];

    function popupIcerik(veri){
        let icerik = `<b>${veri.name}</b><br>`;
        if(aktifKatman==="nufus") icerik += `Nüfus: ${veri.nufus}`;
        else if(aktifKatman==="yas") icerik += `Yaş grubu: ${veri.yas}`;
        else if(aktifKatman==="medeni") icerik += `Medeni: ${veri.medeni}`;
        else if(aktifKatman==="egitim") icerik += `Eğitim: ${veri.egitim}`;
        return icerik;
    }

    mahalleler.forEach(function(m){
        var circle = L.circleMarker([m.lat, m.lon], {
            radius: 16, color: "#222", fillColor: "#cccccc", fillOpacity: 0.9
        }).addTo(map);

        circle.veri = m;
        circle.on("click", function(){
            circle.bindPopup(popupIcerik(circle.veri)).openPopup();
        });
        katmanlar.push(circle);
    });

    // RENK FONKSİYONLARI (Orijinal Kodunla Tam Aynı)
    function renkNufus(n){ return n>9000 ? "#800026" : n>7000 ? "#BD0026" : n>5000 ? "#E31A1C" : n>3000 ? "#FC4E2A" : "#FD8D3C"; }
    function renkYas(y){ return y==="65+" ? "#253494" : y==="40-44" ? "#41b6c4" : "#969696"; }
    function renkEgitim(e){ return e==="İlkokul"?"#FFD700": e==="Lise"?"#008000": e==="Lisans"?"#0000FF":"#999999"; }

    window.gosterNufus = () => { aktifKatman="nufus"; katmanlar.forEach(k=>k.setStyle({fillColor:renkNufus(k.veri.nufus)})); }
    window.gosterYas = () => { aktifKatman="yas"; katmanlar.forEach(k=>k.setStyle({fillColor:renkYas(k.veri.yas)})); }
    window.gosterMedeni = () => { aktifKatman="medeni"; katmanlar.forEach(k=>k.setStyle({fillColor: k.veri.medeni==="Evli" ? "#6a0dad":"#ff1493"})); }
    window.gosterEgitim = () => { aktifKatman="egitim"; katmanlar.forEach(k=>k.setStyle({fillColor:renkEgitim(k.veri.egitim)})); }
    window.resetMap = () => { katmanlar.forEach(k=>k.setStyle({fillColor:"#cccccc"})); };

    // --- DÖVİZ MANTIĞI (Öncekiyle Aynı) ---
    const list = ["USD","EUR","GBP","TRY","JPY","AUD","CAD","CHF","CNY","HKD","NZD","SEK","KRW","SGD","NOK","MXN","INR","RUB","ZAR","BRL","TWD","DKK","PLN","THB","IDR","HUF","CZK","ILS","CLP","PHP","AED","COP","SAR","MYR","RON","VND","KWD","BHD","EGP","PKR","IQD","QAR","AZN","KZT","UAH","DZD","MAD","LBP","JOD","OMR"];
    function fill() {
        const f = document.getElementById('fromCurrency'), t = document.getElementById('toCurrency');
        list.forEach(c => {
            f.add(new Option(c, c, c==="TRY"));
            t.add(new Option(c, c, c==="USD"));
        });
    }
    fill();

    async function convertCurrency() {
        const a = document.getElementById('amount').value, f = document.getElementById('fromCurrency').value, t = document.getElementById('toCurrency').value, r = document.getElementById('result');
        if(!a || a <= 0) return;
        r.innerText = "Yükleniyor...";
        try {
            const response = await fetch(`https://open.er-api.com/v6/latest/${f}`);
            const data = await response.json();
            const res = (a * data.rates[t]).toLocaleString('tr-TR', {minimumFractionDigits:2});
            r.innerText = `${a} ${f} = ${res} ${t}`;
        } catch(e) { r.innerText = "Hata oluştu!"; }
    }
</script>

</body>
</html>
