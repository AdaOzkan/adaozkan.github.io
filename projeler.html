<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | Ada Özkan</title>

    <link rel="icon" type="image/x-icon" href="adalogo.ico">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

    <style>
        /* FONT TANIMLARI */
        @font-face {
            font-family: 'F1Black';
            src: url('Formula1-Black.ttf') format('truetype');
        }
        @font-face {
            font-family: 'F1Regular';
            src: url('Formula1-Regular-1.ttf') format('truetype');
        }

        body { 
            margin: 0; 
            font-family: 'F1Regular', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            height: 100vh;
            overflow-y: auto; /* İçerik uzarsa kaydırılabilir olsun */
            position: relative;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        header {
            background: rgba(20, 41, 72, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3671c6;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .header-logo-img { height: 35px; width: auto; }
        .logo-text { font-family: 'F1Black', sans-serif; color: #27f4d2; font-size: 20px; letter-spacing: 2px; }
        nav a { color: white; margin-left: 25px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #27f4d2; }

        .main-container {
            margin: 30px auto;
            max-width: 1200px;
            background: rgba(15, 15, 15, 0.9);
            border-radius: 25px;
            border: 1px solid #222;
            padding: 30px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: 'F1Black', sans-serif;
            border-left: 5px solid #e8002d;
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* HARİTA BÖLÜMÜ */
        #map { 
            width: 100%; 
            height: 500px;
            border-radius: 15px;
            margin-bottom: 40px;
            z-index: 1; 
        }

        .panel {
            position: absolute;
            top: 110px;
            left: 50px;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px;
            z-index: 1000;
            border-radius: 12px;
            border: 1px solid #3671c6;
        }

        button {
            margin: 3px;
            padding: 8px 12px;
            border: 1px solid #27f4d2;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #27f4d2;
            font-family: 'F1Regular', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        button:hover { background: #27f4d2; color: #000; }
        .reset-btn { border-color: #e8002d !important; color: #e8002d !important; }

        /* CURRENCY CONVERTER BÖLÜMÜ */
        .converter-section {
            background: rgba(30, 30, 30, 0.5);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 11px; color: #27f4d2; font-family: 'F1Black', sans-serif; }

        input, select {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: 'F1Regular', sans-serif;
            outline: none;
        }

        input:focus, select:focus { border-color: #27f4d2; }

        .result-display {
            margin-top: 20px;
            font-family: 'F1Black', sans-serif;
            font-size: 24px;
            color: #27f4d2;
            text-align: center;
            min-height: 30px;
        }

        .convert-btn {
            background: #27f4d2;
            color: #000;
            font-family: 'F1Black', sans-serif;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 14px;
        }

        .convert-btn:hover { background: #fff; transform: scale(1.02); }

        .leaflet-container { background: #111 !important; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <a href="index.html" class="logo-container">
        <img src="adalogo.ico" alt="Logo" class="header-logo-img">
        <span class="logo-text">ADA OZKAN</span>
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html" style="color: #27f4d2;">Projects</a>
    </nav>
</header>

<div class="main-container">
    <h2>Project 01: Mahalle Veri Analizi</h2>
    <div class="panel">
        <button onclick="gosterNufus()">Nüfus</button>
        <button onclick="gosterYas()">Yaş</button>
        <button onclick="gosterMedeni()">Medeni</button>
        <button onclick="gosterEgitim()">Eğitim</button>
        <button onclick="resetMap()" class="reset-btn">Temizle</button>
    </div>
    <div id="map"></div>

    <h2>Project 02: Currency Converter</h2>
    <div class="converter-section">
        <div class="converter-grid">
            <div class="input-group">
                <label>MİKTAR</label>
                <input type="number" id="amount" value="1" placeholder="Miktar girin...">
            </div>
            <div class="input-group">
                <label>KAYNAK</label>
                <select id="fromCurrency">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="TRY" selected>TRY - Turkish Lira</option>
                </select>
            </div>
            <div class="input-group">
                <label>HEDEF</label>
                <select id="toCurrency">
                    <option value="USD" selected>USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="TRY">TRY - Turkish Lira</option>
                </select>
            </div>
            <button class="convert-btn" onclick="convertCurrency()">HESAPLA</button>
        </div>
        <div class="result-display" id="result">---</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    // PARTICLES-JS
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#27f4d2" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.4 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#3671c6", "opacity": 0.3, "width": 1 },
            "move": { "speed": 1.5 }
        }
    });

    // HARİTA AYARLARI (Öncekiyle aynı)
    var aktifKatman = "nufus";
    var katmanlar = [];
    var map = L.map('map').setView([41.398, 27.35], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var mahalleler = [
        {name:"Sevgi",lat:41.3919, lon:27.3454, nufus:2100, yas:"65+", medeni:"Evli", egitim:"Lisans"},
        {name:"8 Kasım",lat:41.3901, lon:27.3549, nufus:10900, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Hürriyet",lat:41.4031, lon:27.3424, nufus:7300, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yılmaz",lat:41.4120, lon:27.3508, nufus:3200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Dere",lat:41.4090, lon:27.3321, nufus:1800, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gençlik",lat:41.3981, lon:27.3491, nufus:6400, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kurtuluş",lat:41.3989, lon:27.3565, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Siteler",lat:41.3966, lon:27.3570, nufus:7600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Yıldız",lat:41.3982, lon:27.3659, nufus:8000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"İnönü",lat:41.4019, lon:27.3600, nufus:6000, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Kocasinan",lat:41.4068, lon:27.3453, nufus:6200, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Gündoğu",lat:41.4082, lon:27.3630, nufus:6700, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Atatürk",lat:41.4033, lon:27.3697, nufus:9700, yas:"40-44", medeni:"Evli", egitim:"Lise"},
        {name:"Güneş",lat:41.4058, lon:27.3698, nufus:5900, yas:"65+", medeni:"Evli", egitim:"İlkokul"},
        {name:"Cumhuriyet",lat:41.4139, lon:27.3592, nufus:3600, yas:"65+", medeni:"Evli", egitim:"Lise"},
        {name:"Barış",lat:41.4116, lon:27.3598, nufus:4100, yas:"65+", medeni:"Evli", egitim:"İlkokul"}
    ];

    mahalleler.forEach(function(m){
        var circle = L.circleMarker([m.lat, m.lon], { radius: 12, color: "#222", fillColor: "#cccccc", fillOpacity: 0.9 }).addTo(map);
        circle.veri = m;
        circle.on("click", function() {
            let icerik = `<b>${m.name} Mahallesi</b><br>`;
            if(aktifKatman==="nufus") icerik += `Nüfus: ${m.nufus}`;
            else if(aktifKatman==="yas") icerik += `Yaş: ${m.yas}`;
            else if(aktifKatman==="medeni") icerik += `Medeni: ${m.medeni}`;
            else if(aktifKatman==="egitim") icerik += `Eğitim: ${m.egitim}`;
            circle.bindPopup(icerik).openPopup();
        });
        katmanlar.push(circle);
    });

    window.gosterNufus = () => { aktifKatman = "nufus"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.nufus > 7000 ? "#800026" : "#FD8D3C"})); };
    window.gosterYas = () => { aktifKatman = "yas"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.yas === "65+" ? "#253494" : "#41b6c4"})); };
    window.gosterMedeni = () => { aktifKatman = "medeni"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.medeni === "Evli" ? "#6a0dad" : "#ff1493"})); };
    window.gosterEgitim = () => { aktifKatman = "egitim"; katmanlar.forEach(k => k.setStyle({fillColor: k.veri.egitim === "Lisans" ? "#0000FF" : "#008000"})); };
    window.resetMap = () => { katmanlar.forEach(k => k.setStyle({fillColor: "#cccccc"})); };

    // CURRENCY CONVERTER MANTIĞI
    async function convertCurrency() {
        const amount = document.getElementById('amount').value;
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const resultDiv = document.getElementById('result');

        if (amount === "" || amount <= 0) {
            resultDiv.innerText = "Lütfen geçerli bir miktar girin.";
            return;
        }

        resultDiv.innerText = "Hesaplanıyor...";

        try {
            // Ücretsiz ve API Key gerektirmeyen bir döviz API'si (Örnek: er-api.com)
            const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await response.json();
            
            if (data.result === "success") {
                const rate = data.rates[to];
                const convertedAmount = (amount * rate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                resultDiv.innerText = `${amount} ${from} = ${convertedAmount} ${to}`;
            } else {
                resultDiv.innerText = "Veri alınamadı.";
            }
        } catch (error) {
            resultDiv.innerText = "Bağlantı hatası!";
            console.error(error);
        }
    }
</script>

</body>
</html>
