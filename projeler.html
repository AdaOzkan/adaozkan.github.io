<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Özkan - F1 Portfolio</title>
    <style>
        /* Font Tanımlama */
        @font-face {
            font-family: 'Formula1-Bold';
            /* Font dosyasının HTML ile aynı klasörde olduğunu varsayıyoruz */
            src: url('Formula1-Bold_web.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        :root {
            --f1-red: #e10600;
            --dark-bg: #15151e;
            --white: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--white);
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Başlıklar ve İsimler için F1 Fontu */
        .f1-font {
            font-family: 'Formula1-Bold', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            text-align: center;
            border-left: 4px solid var(--f1-red);
            padding: 20px;
        }

        /* Piastri yerine gelen BEST TIME alanı */
        .best-time-label {
            color: var(--f1-red);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* Büyük Sayaç */
        #big-countdown {
            font-size: 6rem;
            margin: 20px 0;
            color: var(--white);
        }

        /* İsim girişi alanı */
        .user-section {
            margin-top: 40px;
        }

        #display-name {
            font-size: 2.5rem;
            display: block;
            margin-top: 10px;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="best-time-label f1-font">BEST TIME</div>
        
        <div id="big-countdown" class="f1-font">00:00:00</div>

        <div class="user-section">
            <input type="text" id="name-input" placeholder="İsim giriniz..." oninput="updateName()">
            <span id="display-name" class="f1-font">ADA ÖZKAN</span>
        </div>
    </div>

    <script>
        // İsim güncelleme fonksiyonu
        function updateName() {
            const input = document.getElementById('name-input');
            const display = document.getElementById('display-name');
            display.innerText = input.value.toUpperCase() || "ADA ÖZKAN";
        }

        // Örnek sayaç döngüsü
        function startTimer() {
            let seconds = 0;
            setInterval(() => {
                seconds++;
                let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                let secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('big-countdown').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        startTimer();
    </script>
</body>
</html>
